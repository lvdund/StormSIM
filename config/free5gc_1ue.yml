gnodeb:
  controlif:
    ip: "192.168.1.10"
    port: 9487
  dataif:
    ip: "192.168.1.10"
    port: 2152
  listGnbs: # for handover: need more than 1 gnb
    - gnbid: "000001" # gnb 1
      tac: "000001"
      plmn:
        mcc: "208"
        mnc: "93"
      slicesupportlist:
        - sst: "01"
          sd: "010203"
    - gnbid: "000011" # gnb 2
      tac: "000001"
      plmn:
        mcc: "208"
        mnc: "93"
      slicesupportlist:
        - sst: "01"
          sd: "010203"
defaultUe:
  msin: "0000000000"
  key: "8baf473f2f8fd09487cccbd7097c6862"
  op: "8e27b6af0e692e750f32667a3b14605d"
  amf: "8000"
  sqn: "00000000"
  dnn: "internet"
  routingindicator: "0000"
  hplmn:
    mcc: "208"
    mnc: "93"
  snssai:
    sst: 01
    sd: "010203" 
  integrity:
    nia0: false
    nia1: false
    nia2: true
    nia3: false
  ciphering:
    nea0: true
    nea1: false
    nea2: true
    nea3: false
  delay: 10000 # set delay of assign event to each ue in 1 group (milisecond)
amfif:
  - ip: "192.168.1.15"
    port: 38412
scenarios:
  - nUEs: 2 # 1
    gnbs:
      - "000001"
    ueEvents:
      - event: "RegisterInit Event"
      - event: "PduSessionInit Event"
  - nUEs: 2 # 1
    gnbs:
      - "000011"
    ueEvents:
      - event: "RegisterInit Event"
      - event: "PduSessionInit Event"
remote:
  enable: true
  ip: "0.0.0.0"
  port: 4000
testconf:
  enableFuzz: false
  5gmm:
    states:
    - "Registered State"
    - "Deregisterd State"
    events:
    - "RegisterInit Event"
    - "DeregistraterInit Event"
    - "RegistrationAcceptEvent Event"
    - "DeregistrationAcceptEvent Event"
  5gsm:
    states:
    - "PDUSessionActive State"
    - "PDUSessionInactive State"
    events:
    - "PduSessionInit Event"
    - "EstablishmentAccept Event"
    - "DestroyPduSession Event"
loglevel: info # info, trace, debug, warn, error, fatal, panic
